<script>
  // <object> doesn't size an embedded SVG the same way <img> does with
  // object-fit:cover (the SVG here has no width/height, only a viewBox, so an
  // <object> falls back to a generic intrinsic size instead of the real 86.9x33.39
  // ratio). We replicate the exact same "cover" crop manually, using the SVG's
  // real aspect ratio, so the zoom extent matches what it was with <img>.
  const IMG_W = 86.9;
  const IMG_H = 33.39;

  const planImage = document.getElementById('plan-image');
  let panX = 50; // 0 = full left, 50 = center, 100 = full right
  const PAN_STEP = 3;

  function layout() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    const scale = Math.max(w / IMG_W, h / IMG_H);
    const renderedW = IMG_W * scale;
    const renderedH = IMG_H * scale;
    planImage.style.width = `${renderedW}px`;
    planImage.style.height = `${renderedH}px`;

    const slack = Math.max(0, renderedW - w);
    const panOffset = ((50 - panX) / 100) * slack;
    planImage.style.marginLeft = `${panOffset}px`;
  }

  window.addEventListener('load', layout);
  window.addEventListener('resize', layout);
  layout();

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') {
      panX = Math.max(0, panX - PAN_STEP);
      layout();
    } else if (e.key === 'ArrowRight') {
      panX = Math.min(100, panX + PAN_STEP);
      layout();
    } else if (e.key === 'Home' || e.key === ' ') {
      panX = 50;
      layout();
    }
  });

  // let visitors click a location marker to bring it to full opacity (its markers
  // and direction arrow are otherwise dimmed) -- the SVG is now inlined directly
  // into this document, so we can reach its elements via document/planImage
  // directly instead of through a contentDocument.
  function initMarkerSelection() {
    const style = document.createElementNS('http://www.w3.org/2000/svg', 'style');
    style.textContent = `
      .location-marker { cursor: pointer; }
      .location-marker.selected,
      .direction-arrow.selected *,
      .scenario-label.selected,
      .location-marker.hovered,
      .direction-arrow.hovered *,
      .scenario-label.hovered {
        opacity: 1 !important;
      }
    `;
    planImage.appendChild(style);

    const markers = Array.from(document.querySelectorAll('.location-marker'));
    const arrows = Array.from(document.querySelectorAll('.direction-arrow'));
    const labels = Array.from(document.querySelectorAll('.scenario-label'));

    function clearSelection() {
      markers.forEach((m) => m.classList.remove('selected'));
      arrows.forEach((a) => a.classList.remove('selected'));
      labels.forEach((l) => l.classList.remove('selected'));
    }

    markers.forEach((marker) => {
      const id = marker.getAttribute('data-marker-id');
      const arrow = arrows.find((a) => a.getAttribute('data-marker-id') === id);
      const label = labels.find((l) => l.getAttribute('data-marker-id') === id);

      marker.addEventListener('click', () => {
        const wasSelected = marker.classList.contains('selected');
        clearSelection();
        if (!wasSelected) {
          marker.classList.add('selected');
          if (arrow) arrow.classList.add('selected');
          if (label) label.classList.add('selected');
        }
      });

      marker.addEventListener('mouseenter', () => {
        marker.classList.add('hovered');
        if (arrow) arrow.classList.add('hovered');
        if (label) label.classList.add('hovered');
      });

      marker.addEventListener('mouseleave', () => {
        marker.classList.remove('hovered');
        if (arrow) arrow.classList.remove('hovered');
        if (label) label.classList.remove('hovered');
      });
    });
  }

  initMarkerSelection();

  // Robot movement engine -- replaces the old continuous SMIL loop with a real
  // per-frame JS simulation, mimicking a pickup/deliver/return task cycle:
  // each robot idles at "home" (its original position), travels to the far end
  // of its route (the "destination"), idles there, then travels back -- and
  // robots yield (pause in place) to each other when they get too close while
  // both are moving, with the one heading home never yielding (it must clear
  // the area, same as the reference project's "returning" robots).

  const COLLISION_RADIUS = 2.8;

  function buildRouteData(pts) {
    const cum = [0];
    for (let i = 1; i < pts.length; i++) {
      const dx = pts[i][0]-pts[i-1][0], dy = pts[i][1]-pts[i-1][1];
      cum.push(cum[i-1] + Math.hypot(dx, dy));
    }
    const total = cum[cum.length-1];
    const midIdx = (pts.length-1)/2;
    return { pts, cum, total, destDist: cum[midIdx] };
  }

  function sampleRoute(route, dist) {
    dist = Math.max(0, Math.min(route.total, dist));
    const { pts, cum } = route;
    let i = 1;
    while (i < cum.length - 1 && cum[i] < dist) i++;
    const i0 = i - 1;
    const d0 = cum[i0], d1 = cum[i];
    const segLen = d1 - d0;
    const t = segLen > 1e-6 ? (dist - d0) / segLen : 0;
    const p0 = pts[i0], p1 = pts[i];
    const x = p0[0] + (p1[0]-p0[0]) * t;
    const y = p0[1] + (p1[1]-p0[1]) * t;
    const angle = Math.atan2(p1[1]-p0[1], p1[0]-p0[0]) * 180 / Math.PI;
    return { x, y, angle };
  }

  // Motion profile borrowed from the reference repo's AnimationController:
  // segments run on an eased 0->1 "leg progress" (easeInOutCubic, so each
  // trip accelerates away from a stop and decelerates into the next one)
  // rather than raw constant speed, pauses at each end are short and snappy
  // (its grabbing/releasing are 0.5s), and the return trip runs faster than
  // the outbound one (its returning=1.6s vs moving_to_*=2.0s -> 1.25x).
  function easeInOutCubic(t) {
    return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;
  }

  const BASE_SPEED = 2.4;          // units/sec, outbound leg
  const RETURN_SPEED_MULT = 1.25;  // return leg runs faster, like the reference
  const PAUSE_DEST = 0.5;          // seconds -- mirrors grabbing/releasing
  const PAUSE_HOME_MIN = 0.4;
  const PAUSE_HOME_JITTER = 0.5;   // small stagger so robots don't lock-step

  function initRobotEngine() {
    const robotEls = Array.from(document.querySelectorAll('.robot'))
      .sort((a, b) => (+a.getAttribute('data-robot-index')) - (+b.getAttribute('data-robot-index')));

    const robots = ROBOT_ROUTES.map((pts, i) => {
      const route = buildRouteData(pts);
      const outDur  = route.destDist / BASE_SPEED;
      const backDur = (route.total - route.destDist) / (BASE_SPEED * RETURN_SPEED_MULT);
      return {
        route,
        el: robotEls[i],
        dist: 0,           // current distance along the there-and-back route
        legT: 0,            // 0..1 normalized progress within the current leg
        legDuration: outDur,
        outDur, backDur,
        dir: 1,
        state: 'idle_home',
        idleTimer: 0.4 + Math.random() * 2.0,
        homePause: PAUSE_HOME_MIN + Math.random() * PAUSE_HOME_JITTER,
        destPause: PAUSE_DEST,
        heading: null,
        stuckTime: 0,   // seconds continuously paused for collision -- forces
                        // through past STUCK_TIMEOUT so mutual-yield deadlocks
                        // between robots can never freeze the scene forever
      };
    });

    let lastTs = null;

    function frame(ts) {
      // A stray exception here would otherwise silently stop the recursive
      // requestAnimationFrame call and freeze every robot in place forever.
      try {
        stepSimulation(ts);
      } catch (e) {
        console.error('Robot engine error (continuing):', e);
      }
      requestAnimationFrame(frame);
    }

    function stepSimulation(ts) {
      if (lastTs === null) lastTs = ts;
      const dt = Math.min(0.05, (ts - lastTs) / 1000);
      lastTs = ts;

      for (const r of robots) {
        if (r.state === 'idle_home' || r.state === 'idle_dest') {
          r.idleTimer -= dt;
          if (r.idleTimer <= 0) {
            r.dir = r.state === 'idle_home' ? 1 : -1;
            r.legT = 0;
            r.legDuration = r.dir === 1 ? r.outDur : r.backDur;
            r.state = 'moving';
          }
        }
      }

      // distFor(r, legT) -- eased distance-along-route for a given leg progress,
      // without mutating the robot (used both to render and to look ahead).
      function distFor(r, legT) {
        const eased = easeInOutCubic(Math.max(0, Math.min(1, legT)));
        return r.dir === 1
          ? r.route.destDist * eased
          : r.route.destDist + (r.route.total - r.route.destDist) * eased;
      }

      // Priority: a robot heading home (dir -1) always wins and is never paused
      // (it must clear the area). A moving robot yields to a robot that is
      // currently idle/parked. Between two moving robots of equal priority,
      // we don't tie-break by array index (that let a trailing robot keep
      // closing in on one that had already stopped, producing an overlapping
      // "conga line"). Instead we check who is actually CLOSING the gap --
      // only a robot whose own movement would shrink the distance gets
      // paused; if both are closing (head-on), both pause.
      function priority(r) {
        if (r.state !== 'moving') return 3;       // parked -- highest, never yields
        return r.dir === -1 ? 2 : 1;               // returning home > outbound
      }

      function isClosing(mover, otherPos) {
        const cur  = sampleRoute(mover.route, distFor(mover, mover.legT));
        const next = sampleRoute(mover.route, distFor(mover, mover.legT + dt * 3 / mover.legDuration));
        const d0 = Math.hypot(cur.x - otherPos.x, cur.y - otherPos.y);
        const d1 = Math.hypot(next.x - otherPos.x, next.y - otherPos.y);
        return d1 < d0 - 1e-6;
      }

      const positions = robots.map((r) => sampleRoute(r.route, distFor(r, r.legT)));
      const paused = new Array(robots.length).fill(false);
      for (let i = 0; i < robots.length; i++) {
        for (let j = i + 1; j < robots.length; j++) {
          if (robots[i].state !== 'moving' && robots[j].state !== 'moving') continue;
          const dx = positions[i].x - positions[j].x;
          const dy = positions[i].y - positions[j].y;
          if (dx*dx + dy*dy < COLLISION_RADIUS*COLLISION_RADIUS) {
            const pi = priority(robots[i]);
            const pj = priority(robots[j]);
            if (pi < pj) { if (robots[i].state === 'moving') paused[i] = true; continue; }
            if (pj < pi) { if (robots[j].state === 'moving') paused[j] = true; continue; }
            // equal priority: pause whichever one(s) are closing the gap
            if (robots[i].state === 'moving' && isClosing(robots[i], positions[j])) paused[i] = true;
            if (robots[j].state === 'moving' && isClosing(robots[j], positions[i])) paused[j] = true;
          }
        }
      }

      const STUCK_TIMEOUT = 3.0; // seconds -- after this, force through regardless of yielding

      for (let i = 0; i < robots.length; i++) {
        const r = robots[i];
        if (r.state !== 'moving') continue;
        if (paused[i]) {
          r.stuckTime += dt;
          if (r.stuckTime < STUCK_TIMEOUT) continue;
          // Timed out waiting -- proceed anyway so a mutual-yield deadlock
          // between two or more robots can never freeze the scene forever.
        } else {
          r.stuckTime = 0;
        }
        r.legT += dt / r.legDuration;
        if (r.legT >= 1) {
          r.legT = 1;
          if (r.dir === 1) {
            r.state = 'idle_dest';
            r.idleTimer = r.destPause;
          } else {
            r.state = 'idle_home';
            r.idleTimer = r.homePause;
          }
        }
      }

      for (const r of robots) {
        const p = sampleRoute(r.route, distFor(r, r.legT));
        if (r.heading === null) r.heading = p.angle;
        let da = ((p.angle - r.heading + 540) % 360) - 180;
        r.heading += da * Math.min(1, dt * 6);
        r.el.setAttribute('transform',
          `translate(${p.x.toFixed(3)},${p.y.toFixed(3)}) rotate(${r.heading.toFixed(2)}) translate(-1.8,-0.76)`);
      }
    }

    requestAnimationFrame(frame);
  }

  initRobotEngine();
